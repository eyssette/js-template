# https://taskfile.dev

version: '3'

vars:
  APP_FOLDER: "app"
  DIST_FOLDER: "dist"
  TEST_FOLDER: "tests"
  FEATURES_FOLDER: "features"
  PORT_LOCAL_SERVER: 8888
  PORT_DEV_SERVER: 10001
  CURRENT_E2E_TEST: "@CURRENT"
  REPORT_DIR: ".report"

tasks:
  build:
    aliases:
      - default
    cmds:
      - task: rolldown:build

  rolldown:build:
    deps: [npm:install]
    sources:
      - "{{.APP_FOLDER}}/js/**/*.mjs"
      - "{{.APP_FOLDER}}/css/**/*.css"
      - rolldown.config.mjs
    generates:
      - "{{.DIST_FOLDER}}/css/styles.min.css"
      - "{{.DIST_FOLDER}}/script.min.js"
      - "{{.DIST_FOLDER}}/script.min.js.map"
      - "{{.DIST_FOLDER}}/index.html"
    method: timestamp
    cmds:
      - npx rolldown --config

  dev:
    deps: [npm:install]
    cmds:
      - NODE_ENV=development npx rolldown --config --watch
  
  dev:stop:
    cmds:
      - bash -c 'kill $(lsof -ti :{{.PORT_DEV_SERVER}}) 2>/dev/null' || true
      
  npm:install:
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm install

  push:
    vars:
      GIT_REPO_NAMES: [forge, github]
    cmds:
      - task: lint
      - task: tests
      - for: { var: GIT_REPO_NAMES }
        cmd:  git push {{.ITEM}} && git push {{.ITEM}} --tags

  tag:
    desc: "Crée un tag avec pour date du tag la date du commit (usage: task tag -- <commit> <tag>)"
    cmds:
      - |
        bash -c '
        set -- "{{.CLI_ARGS}}"
        COMMIT=$1
        TAG=$2

        if [ -z "$COMMIT" ] || [ -z "$TAG" ]; then
          echo "❌ Usage: task tag -- <commit> <tag>"
          exit 1
        fi

        TAG_DATE=$(git show -s --format=%aD "$COMMIT")
        echo "📌 Création du tag \"$TAG\" sur le commit $COMMIT (date: $TAG_DATE)"
        GIT_COMMITTER_DATE="$TAG_DATE" git tag -a "$TAG" "$COMMIT" -m ""
        '
    silent: false

  tests:
    cmds:
      - task: ecma
      - task: tests:unit
      - task: tests:e2e

  tests:e2e:
    aliases:
      - tests:codeceptjs
    sources:
      - "{{.APP_FOLDER}}/css/**/*.css"
      - "{{.APP_FOLDER}}/js/**/*.mjs"
      - "{{.APP_FOLDER}}/js/**/*.js"
      - "{{.APP_FOLDER}}/index.html"
      - "{{.TEST_FOLDER}}/e2e/**/*.js"
      - "{{.TEST_FOLDER}}/e2e/**/*.mjs"
      - "{{.FEATURES_FOLDER}}/**/*.feature"
    cmds:
      # On vérifie avant qu'il n'y ait pas le terme "@CURRENT" dans les fichiers tests e2e
      - cmd: |
          bash -c '
            set -e
            if grep -R --line-number --exclude-dir=node_modules "{{.CURRENT_E2E_TEST}}" tests/e2e features; then
              echo "❌ {{.CURRENT_E2E_TEST}} trouvé dans les tests e2e — supprimez-le avant de lancer les tests."
              exit 1
            fi
          '
        silent: true
      - task: tests:e2e:install:playwright
      - task: server:start
      - defer: {task: server:stop}
      - npx codeceptjs run --steps --grep '(?=.*)^(?!.*@WIP)'

  tests:e2e:current:
    cmds:
      - task: server:start
      - defer: {task: server:stop}
      - npx codeceptjs run --steps --verbose --grep '(?=.*)^(?!.*@WIP)(?=.*{{.CURRENT_E2E_TEST}})'

  tests:e2e:install:playwright:
    cmds:
      # On installe les navigateurs pour Playwright (Chromium, Firefox et WebKit) et si cela ne marche pas pour certains navigateurs, on applique un patch qui permet de contourner le problème (voir https://github.com/microsoft/playwright/issues/1941#issuecomment-1008338376)
      - |
        set -e
        if ! npx playwright install; then
          echo "❌ Échec de l'installation de certains navigateurs Playwright. Application d'un patch pour contourner le problème";
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=true npm i -D playwright
        fi

  tests:unit:
    aliases:
      - tests:jasmine
    sources:
      - "{{.APP_FOLDER}}/js/**/*.mjs"
      - "{{.TEST_FOLDER}}/unit/**/*.mjs"
    cmds:
      - npx jasmine --config='tests/unit/.config/jasmine.mjs'

  tests:coverage:
    aliases:
      - coverage
    silent: true
    cmds:
      # On crée un rapport de couverture de code avec c8, dans le dossier .report/coverage
      - npx c8 --reporter=lcov --reporter=html --reporter=text-summary --include='app/js/**/*.mjs' --exclude='tests/**' --report-dir '.report/coverage' jasmine --config=tests/unit/.config/jasmine.mjs --random=false
      # On ouvre le rapport de couverture dans le navigateur par défaut
      - cmd: |
          if command -v xdg-open > /dev/null; then
            xdg-open .report/coverage/index.html
          elif command -v open > /dev/null; then
            open .report/coverage/index.html
          else
            echo "❌ Impossible d'ouvrir le rapport de couverture automatiquement. Veuillez ouvrir le fichier .report/coverage/index.html manuellement."
          fi
        silent: true

  bump:
    generates:
      - VERSION
      - package.json
      - package-lock.json
      - CHANGELOG.md
    cmds:
      - task: lint
      - task: tests
      - cz bump

  server:start:
    cmds:
      - node {{.TEST_FOLDER}}/e2e/server.mjs {{.PORT_LOCAL_SERVER}} & # On lance le serveur en arrière-plan
      - until nc -z localhost {{.PORT_LOCAL_SERVER}}; do sleep 1; done # On attend que le port soit ouvert avant de lancer la suite
  
  server:stop:
    cmds:
      - bash -c 'kill $(lsof -ti :{{.PORT_LOCAL_SERVER}}) 2>/dev/null' || true

  ecma:
    sources:
      - "{{.APP_FOLDER}}/js/**/*.mjs"
    cmds:
      - npx es-check es2020 "{{.APP_FOLDER}}/js/**/*.mjs" --module

  ecma:staged:
    desc: Vérifie la compatibilité ECMAScript des fichiers .mjs staged (pour le hook pre-commit)
    silent: true
    cmds:
      - |
        FILES=$(git diff --cached --name-only --diff-filter=ACM -- '{{.APP_FOLDER}}/js/**/*.mjs')
        if [ -z "$FILES" ]; then
          exit 0
        fi
        npx es-check es2020 $FILES --module

  lint:
    sources:
      - "{{.APP_FOLDER}}/js/**/*.mjs"
    cmds:
      - npx eslint "{{.APP_FOLDER}}/**/*.mjs"

  lint:staged:
    desc: Lint uniquement les fichiers .mjs staged (pour le hook pre-commit)
    silent: true
    cmds:
      - |
        FILES=$(git diff --cached --name-only --diff-filter=ACM -- '{{.APP_FOLDER}}/**/*.mjs')
        if [ -z "$FILES" ]; then
          exit 0
        fi
        npx eslint $FILES

  compress:png:
    cmds:
    - |
        set -euo pipefail
        echo "Compressing PNGs in {{.APP_FOLDER}}..."
        find "{{.APP_FOLDER}}" -type f -iname "*.png" -exec sh -c '
          for f; do
            echo "Compressing: $f"
            pngquant --force --ext .png --quality=65-80 "$f"
          done
        ' _ {} +
    silent: true

  compress:jpg:
    cmds:
      - |
        set -euo pipefail
        echo "Compressing JPGs in {{.APP_FOLDER}}..."
        find "{{.APP_FOLDER}}" -type f -iname "*.jpg" -exec sh -c '
          for f; do
            echo "Compressing: $f"
            jpegoptim --max=80 --strip-all "$f"
          done
        ' _ {} +
      - |
        set -euo pipefail
        echo "Compressing JPGs in {{.APP_FOLDER}}..."
        find "{{.APP_FOLDER}}" -type f -iname "*.jpeg" -exec sh -c '
          for f; do
            echo "Compressing: $f"
            jpegoptim --max=80 --strip-all "$f"
          done
        ' _ {} +
    silent: true

  compress:svg:
    cmds:
      - npx svgo "{{.APP_FOLDER}}/"

  compress:images:
    cmds:
      - compress:svg
      - compress:png
      - compress:jpg

  tree:
    cmds:
      - tree -a -I '.git|.task|node_modules|_'

  # Tâche pour vérifier les dépendances
  deps:check:
    cmds:
      # Vérifie les versions des dépendances
      - npm outdated

  a11y:check:
    # Vérifie l'accessibilité du site avec pa11y-ci
    cmds:
      - |
        ARGS="{{.CLI_ARGS}}"
        if [ -z "$ARGS" ]; then
          npx pa11y-ci http://localhost:{{.PORT_DEV_SERVER}}
        elif [ "${ARGS#/}" != "$ARGS" ]; then
          npx pa11y-ci "http://localhost:{{.PORT_DEV_SERVER}}$ARGS"
        else
          npx pa11y-ci "$ARGS"
        fi
    silent: true

  a11y:
    cmds:
      # S'il y a un argument passé à la tâche et que cet argument ne commence pas par "/" (ce qui signifie qu'il s'agit d'une URL), on lance directement la tâche "a11y:check" avec cet argument, et on ne lance pas la suite de la tâche
      # Si le port du serveur de développement n'est pas ouvert, on lance la tâche "dev", puis quand le port est ouvert, on lance la tâche "a11y:check", puis on arrête le serveur de développement
      # Si le port du serveur de développement est déjà ouvert, on lance directement la tâche "a11y:check"
      - |
        ARGS="{{.CLI_ARGS}}"
        if [[ -n "$ARGS" && "$ARGS" != /* ]]; then
          task a11y:check -- "$ARGS"
          exit $?
        elif nc -z localhost {{.PORT_DEV_SERVER}}; then
          echo "Le serveur de développement est déjà ouvert. Lancement de la tâche \"a11y:check\"..."
          if [ -n "$ARGS" ]; then
            task a11y:check -- "$ARGS"
          else 
            task a11y:check
          fi
        else
          echo "Le serveur de développement n'est pas ouvert. Lancement de la tâche \"dev\"..."
          task npm:install
          task dev &
          until nc -z localhost {{.PORT_DEV_SERVER}}; do
            sleep 1
          done
          STATUS=0
          if [ -n "$ARGS" ]; then
            task a11y:check -- "$ARGS" || STATUS=$?
          else
            task a11y:check || STATUS=$?
          fi
          echo "Arrêt du serveur de développement..."
          task dev:stop
          exit "$STATUS"
        fi
    silent: true

  security:
    cmds:
      - cmd: task security:npm-audit
        ignore_error: true
      - cmd: task security:semgrep
        ignore_error: true
      - cmd: task security:trivy
        ignore_error: true

  security:npm-audit:
    cmds:
      - npm audit --audit-level=high

  security:semgrep:
    cmds:
      - semgrep scan

  security:trivy:
    cmds:
      - trivy fs --exit-code 1 --severity HIGH,CRITICAL .

  perf:
    # On invite l'utilisateur à utiliser soit "perf:desktop" soit "perf:mobile"
    cmds:
      - cmd: task select-perf-mode --interactive

  select-perf-mode:
    desc: "Sélectionne le mode de performance (desktop ou mobile) pour la tâche perf"
    interactive: true
    # On demande à l'utilisateur de choisir entre le mode desktop et le mode mobile, puis on demande à l'utilisateur de saisir l'URL à tester (ou on utilise l'URL par défaut http://localhost:{{.PORT_DEV_SERVER}} si aucune URL n'est saisie), puis on lance la tâche "perf:desktop" ou "perf:mobile" en fonction du choix de l'utilisateur
    cmds:
      - |
        echo "Sélectionnez le mode de performance :"
        echo "1) desktop"
        echo "2) mobile"
        while true; do
          printf "Votre choix (1 ou 2) : "
          if ! IFS= read -r CHOICE; then
            echo
            echo "Interruption demandée. Arrêt de la sélection du mode de performance."
            exit 130
          fi

          case "$CHOICE" in
            1)
              MODE="desktop"
              break
              ;;
            2)
              MODE="mobile"
              break
              ;;
            *)
              echo "Sélection invalide. Veuillez choisir 1 ou 2."
              ;;
          esac
        done

        echo "Vous avez sélectionné le mode : $MODE"
        printf "Entrez l'URL à tester (ou appuyez sur Entrée pour utiliser l'URL par défaut http://localhost:{{.PORT_DEV_SERVER}}) : "
        if ! IFS= read -r URL; then
          echo
          echo "Interruption demandée. Arrêt de la sélection du mode de performance."
          exit 130
        fi
        if [ -z "$URL" ]; then
          URL="http://localhost:{{.PORT_DEV_SERVER}}"
        fi
        task perf:"$MODE" -- "$URL"
    silent: true

  perf:*:
    aliases:
      - performance:*
    cmds:
      - |
        MODE="{{index .MATCH 0}}"
        if [ -z "$MODE" ]; then
          echo "❌ Veuillez utiliser soit \"perf:desktop\" soit \"perf:mobile\""
          exit 1
        elif [ "$MODE" = "desktop" ] || [ "$MODE" = "mobile" ]; then
          URL="{{.CLI_ARGS}}"
          if [ -z "$URL" ]; then
            URL="http://localhost:{{.PORT_DEV_SERVER}}"
            task lighthouse:"$MODE" -- "$URL"
          fi
          if [ "${URL#/}" != "$URL" ]; then
            task lighthouse:"$MODE" -- "http://localhost:{{.PORT_DEV_SERVER}}$URL"
          else
            task lighthouse:"$MODE" -- "$URL"
          fi 
        else
          echo "❌ Argument invalide pour la tâche \"lighthouse\". Veuillez indiquer soit \"desktop\" soit \"mobile\" comme argument."
          exit 1
        fi
    silent: true

  lighthouse:desktop:
    cmds:
      - mkdir -p {{.REPORT_DIR}}/lighthouse
      - lighthouse {{.CLI_ARGS}} --output html --output-path {{.REPORT_DIR}}/lighthouse/lighthouse-report-desktop.html --chrome-flags="--headless" --view --preset=desktop

  lighthouse:mobile:
    cmds:
      - mkdir -p {{.REPORT_DIR}}/lighthouse
      - lighthouse {{.CLI_ARGS}} --output html --output-path {{.REPORT_DIR}}/lighthouse/lighthouse-report-mobile.html --chrome-flags="--headless" --view --throttling-method=simulate --throttling.rttMs=150 --throttling.throughputKbps=1638.4 --throttling.uploadThroughputKbps=750 --throttling.cpuSlowdownMultiplier=4