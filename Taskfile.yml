# https://taskfile.dev

version: '3'

vars:
  APP_FOLDER: "app"
  TEST_FOLDER: "tests"
  FEATURES_FOLDER: "features"
  PORT_LOCAL_SERVER: 8888
  CURRENT_E2E_TEST: "@CURRENT"

tasks:
  build:
    aliases:
      - default
    cmds:
      - task: rollup:build

  rollup:build:
    deps: [npm:install]
    sources:
      - "{{.APP_FOLDER}}/js/**/*.mjs"
      - "{{.APP_FOLDER}}/css/**/*.css"
      - rollup.config.mjs
    generates:
      - "{{.APP_FOLDER}}/css/styles.min.css"
      - "{{.APP_FOLDER}}/script.min.js"
      - "{{.APP_FOLDER}}/script.min.js.map"
    method: timestamp
    cmds:
      - npx rollup --config

  npm:install:
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm install

  push:
    vars:
      GIT_REPO_NAMES: [forge]
    cmds:
      - task: lint
      - task: tests
      - for: { var: GIT_REPO_NAMES }
        cmd:  git push {{.ITEM}} && git push {{.ITEM}} --tags

  tag:
    desc: "Crée un tag avec pour date du tag la date du commit (usage: task tag -- <commit> <tag>)"
    cmds:
      - |
        bash -c '
        set -- "{{.CLI_ARGS}}"
        COMMIT=$1
        TAG=$2

        if [ -z "$COMMIT" ] || [ -z "$TAG" ]; then
          echo "❌ Usage: task tag -- <commit> <tag>"
          exit 1
        fi

        TAG_DATE=$(git show -s --format=%aD "$COMMIT")
        echo "📌 Création du tag \"$TAG\" sur le commit $COMMIT (date: $TAG_DATE)"
        GIT_COMMITTER_DATE="$TAG_DATE" git tag -a "$TAG" "$COMMIT" -m ""
        '
    silent: false

  tests:
    cmds:
      - task: ecma
      - task: tests:unit
      - task: tests:e2e

  tests:e2e:
    aliases:
      - tests:codeceptjs
    sources:
      - "{{.APP_FOLDER}}/css/**/*.css"
      - "{{.APP_FOLDER}}/js/**/*.mjs"
      - "{{.APP_FOLDER}}/js/**/*.js"
      - "{{.APP_FOLDER}}/index.html"
      - "{{.TEST_FOLDER}}/e2e/**/*.js"
      - "{{.FEATURES_FOLDER}}/**/*.feature"
    cmds:
      # On vérifie avant qu'il n'y ait pas le terme "@CURRENT" dans les fichiers tests e2e
      - cmd: |
          bash -c '
            set -e
            if grep -R --line-number --exclude-dir=node_modules "{{.CURRENT_E2E_TEST}}" tests/e2e features; then
              echo "❌ {{.CURRENT_E2E_TEST}} trouvé dans les tests e2e — supprimez-le avant de lancer les tests."
              exit 1
            fi
          '
        silent: true
      - npx playwright install
      - task: server:start
      - defer: {task: server:stop}
      - npx codeceptjs run --steps --grep '(?=.*)^(?!.*@WIP)'

  tests:e2e:current:
    cmds:
      - task: server:start
      - defer: {task: server:stop}
      - npx codeceptjs run --steps --grep '(?=.*)^(?!.*@WIP)(?=.*{{.CURRENT_E2E_TEST}})'

  tests:unit:
    aliases:
      - tests:jasmine
    sources:
      - "{{.APP_FOLDER}}/js/**/*.mjs"
      - "{{.TEST_FOLDER}}/unit/**/*.mjs"
    cmds:
      - npx jasmine --config='tests/unit/.config/jasmine.mjs'

  bump:
    generates:
      - VERSION
      - package.json
      - package-lock.json
      - CHANGELOG.md
    cmds:
      - task: lint
      - task: tests
      - cz bump

  server:start:
    cmds:
      - node server.js {{.PORT_LOCAL_SERVER}} & # On lance le serveur en arrière-plan
      - until nc -z localhost {{.PORT_LOCAL_SERVER}}; do sleep 1; done # On attend que le port soit ouvert avant de lancer la suite
  
  server:stop:
    cmds:
      - kill $(lsof -ti :{{.PORT_LOCAL_SERVER}}) 2>/dev/null || true

  ecma:
    sources:
      - "{{.APP_FOLDER}}/js/**/*.mjs"
    cmds:
      - npx es-check es2018 "{{.APP_FOLDER}}/js/**/*.mjs" --module

  lint:
    sources:
      - "{{.APP_FOLDER}}/js/**/*.mjs"
    cmds:
      - npx eslint "{{.APP_FOLDER}}/**/*.mjs"

  compress:png:
    cmds:
    - |
        set -euo pipefail
        echo "Compressing PNGs in {{.APP_FOLDER}}..."
        find "{{.APP_FOLDER}}" -type f -iname "*.png" -exec sh -c '
          for f; do
            echo "Compressing: $f"
            pngquant --force --ext .png --quality=65-80 "$f"
          done
        ' _ {} +
    silent: true

  compress:jpg:
    cmds:
      - |
        set -euo pipefail
        echo "Compressing JPGs in {{.APP_FOLDER}}..."
        find "{{.APP_FOLDER}}" -type f -iname "*.jpg" -exec sh -c '
          for f; do
            echo "Compressing: $f"
            jpegoptim --max=80 --strip-all "$f"
          done
        ' _ {} +
      - |
        set -euo pipefail
        echo "Compressing JPGs in {{.APP_FOLDER}}..."
        find "{{.APP_FOLDER}}" -type f -iname "*.jpeg" -exec sh -c '
          for f; do
            echo "Compressing: $f"
            jpegoptim --max=80 --strip-all "$f"
          done
        ' _ {} +
    silent: true

  compress:svg:
    cmds:
      - npx svgo "{{.APP_FOLDER}}/"

  compress:images:
    cmds:
      - compress:svg
      - compress:png
      - compress:jpg
